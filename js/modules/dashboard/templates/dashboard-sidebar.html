<!-- CSS específico para sidebar com submenus -->
<style>
.menu-section {
    margin-bottom: 2px;
}

.menu-toggle {
    cursor: pointer;
    transition: all 0.3s ease;
}

.menu-toggle:hover {
    background: rgba(255, 255, 255, 0.1);
}

.toggle-icon {
    transition: transform 0.3s ease;
    font-size: 0.8rem;
}

.menu-section.expanded .toggle-icon {
    transform: rotate(180deg);
}

.submenu {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    background: rgba(0, 0, 0, 0.2);
}

.menu-section.expanded .submenu {
    max-height: 300px;
}

.submenu-item {
    padding: 8px 20px 8px 45px;
    color: rgba(255, 255, 255, 0.8);
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 0.9rem;
    border-left: 2px solid transparent;
}

.submenu-item:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    border-left-color: var(--tokencafe-primary, #f59e0b);
}

.submenu-item.active {
    background: rgba(245, 158, 11, 0.2);
    color: #fff;
    border-left-color: var(--tokencafe-primary, #f59e0b);
}

.submenu-item i {
    width: 16px;
    text-align: center;
    margin-right: 8px;
    font-size: 0.8rem;
}

.sidebar-footer {
    position: absolute;
    bottom: 15px;
    left: 15px;
    right: 15px;
}

.wallet-info {
    padding: 10px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

#wallet-info.connected {
    border-color: #10b981;
    background: rgba(16, 185, 129, 0.1);
}

#wallet-info.disconnected {
    border-color: #ef4444;
    background: rgba(239, 68, 68, 0.1);
}
</style>
