<!--
================================================================================
DASHBOARD MAIN CONTENT - COMPONENTE DE CONTEÚDO PRINCIPAL
================================================================================
Área principal do dashboard que muda conforme navegação do sidebar
Integração com sistema de páginas dinâmicas
================================================================================
-->

<main class="dashboard-main" id="main-content">
    <!-- Header -->
    <header class="dashboard-header" id="dashboard-header">
        <div class="d-flex align-items-center">
            <h4 class="text-white mb-0" id="page-title">Visão Geral</h4>
        </div>
        
        <div class="ms-auto d-flex align-items-center gap-3">
            <!-- Quick Actions -->
            <button class="btn btn-primary btn-sm" onclick="quickAction('create-token')">
                <i class="fas fa-plus me-1"></i>Novo Token
            </button>
            
            <button class="btn btn-success btn-sm" onclick="quickAction('create-widget')">
                <i class="fas fa-cube me-1"></i>Novo Widget
            </button>
            
            <!-- User Menu -->
            <div class="dropdown">
                <button class="btn btn-outline-secondary btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
                    <i class="fas fa-user me-1"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="#" onclick="navigateTo('profile')">
                        <i class="fas fa-user me-2"></i>Meu Perfil
                    </a></li>
                    <li><a class="dropdown-item" href="#" onclick="navigateTo('settings')">
                        <i class="fas fa-cog me-2"></i>Configurações
                    </a></li>
                    <li><hr class="dropdown-divider" /></li>
                    <li><a class="dropdown-item text-danger" href="#" onclick="disconnectWallet()">
                        <i class="fas fa-sign-out-alt me-2"></i>Desconectar
                    </a></li>
                </ul>
            </div>
        </div>
    </header>

    <!-- Content Area -->
    <div class="dashboard-content">
        <!-- Dynamic Content Area -->
        <div id="dynamic-content" class="page-content">
            <!-- Conteúdo será carregado dinamicamente aqui -->
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Carregando...</span>
                </div>
                <p class="mt-3 text-muted">Carregando conteúdo...</p>
            </div>
        </div>
    </div>
</main>

<!-- CSS específico para main content -->
<style>
.page-content {
    display: none;
}

.page-content.active {
    display: block;
}

.quick-action-card {
    cursor: pointer;
    transition: all 0.3s ease;
    border: 1px solid transparent;
}

.quick-action-card:hover {
    transform: translateY(-2px);
    border-color: rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
}

.stats-card {
    text-align: center;
    padding: 20px;
}

.stats-number {
    font-size: 2rem;
    font-weight: bold;
    color: var(--tokencafe-primary, #f59e0b);
    margin-bottom: 5px;
}

.stats-label {
    color: #6b7280;
    font-size: 0.9rem;
}

.wallet-info-card {
    background: linear-gradient(135deg, var(--tokencafe-primary, #f59e0b), var(--tokencafe-secondary, #d97706));
}

#welcome-title.personalized {
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}

.loading-spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255,255,255,.3);
    border-radius: 50%;
    border-top-color: #fff;
    animation: spin 1s ease-in-out infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>

<!-- Script movido para js/main-content-manager.js -->
