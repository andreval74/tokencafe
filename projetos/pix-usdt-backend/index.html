<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>PIX → USDT Demo</title>
</head>
<body>
  <h2>Conversor PIX → USDT</h2>
  <form id="pixForm">
    <label>Valor em BRL: <input type="number" id="valorBRL" required></label>
    <button type="submit">Gerar PIX</button>
  </form>
  <div id="pixData"></div>
  <div id="result"></div>
  <script>
    const backend = "http://localhost:3000";

    document.getElementById("pixForm").onsubmit = async (e) => {
      e.preventDefault();
      const valorBRL = document.getElementById("valorBRL").value;
      const res = await fetch(backend + "/api/pix/charge", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ valorBRL, rede: "Ethereum" })
      });
      const data = await res.json();
      document.getElementById("pixData").innerHTML = "<pre>" + JSON.stringify(data, null, 2) + "</pre>";

      // simular webhook após 5s
      setTimeout(async () => {
        const confirm = await fetch(backend + "/api/pix/webhook", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ pixId: data.id, valorBRL, rede: "Ethereum" })
        });
        const tx = await confirm.json();
        document.getElementById("result").innerHTML = "<pre>" + JSON.stringify(tx, null, 2) + "</pre>";
      }, 5000);
    };
  </script>
</body>
</html>
