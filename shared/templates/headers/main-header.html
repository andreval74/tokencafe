<script>
// Atualizar UI do header baseado no estado da autenticação
document.addEventListener('auth:connected', function(event) {
    const { account, state } = event.detail;
    
    // Mostrar informações da carteira
    document.getElementById('wallet-account-container').style.display = 'block';
    document.getElementById('wallet-balance-container').style.display = 'block';
    document.getElementById('wallet-actions').style.display = 'block';
    document.getElementById('connect-wallet-btn').style.display = 'none';
    
    // Atualizar textos
    document.getElementById('wallet-account').textContent = 
        `${account.slice(0, 6)}...${account.slice(-4)}`;
    document.getElementById('wallet-network').textContent = state.network || 'Desconhecida';
    document.getElementById('wallet-balance').textContent = `${state.balance} ETH`;
});

document.addEventListener('auth:disconnected', function(event) {
    // Ocultar informações da carteira
    document.getElementById('wallet-account-container').style.display = 'none';
    document.getElementById('wallet-balance-container').style.display = 'none';
    document.getElementById('wallet-actions').style.display = 'none';
    document.getElementById('connect-wallet-btn').style.display = 'block';
    
    // Resetar textos
    document.getElementById('wallet-account').textContent = 'Não conectado';
    document.getElementById('wallet-network').textContent = 'Desconectado';
    document.getElementById('wallet-balance').textContent = '0 ETH';
});

document.addEventListener('auth:networkChanged', function(event) {
    const { network } = event.detail;
    document.getElementById('wallet-network').textContent = network;
});

// Animação para link ativo
document.addEventListener('DOMContentLoaded', function() {
    const currentPage = window.location.pathname.split('/').pop();
    const navLinks = document.querySelectorAll('.nav-link[href]');
    
    navLinks.forEach(link => {
        if (link.getAttribute('href') === currentPage) {
            link.classList.add('active');
        }
    });
});
</script>
