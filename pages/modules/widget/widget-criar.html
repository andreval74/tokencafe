<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar Widget - TokenCafe</title>
    <!--
      Página: Criar Widget de Venda (TokenCafe)
      Função: Interface simplificada para configurar e gerar widget de compra.
      Dependências: Bootstrap, ethers 5.x, módulos shared (base-system, network-manager, wallet-connector, page-manager),
                    contract-deployer (global), widget-simple (ES6 module).
      Observação: overrides __overrideChainId/__overrideSaleContract/__overrideReceiverWallet/__overrideTokenContract
                  são apenas para desenvolvimento e podem ser removidos em produção.
    -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="../../../css/styles.css" rel="stylesheet" />

    <!-- Custom CSS para o widget -->
    <style>
      .widget-container {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 15px;
        padding: 2rem;
        color: white;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }
      .form-control:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
      }
      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        border-radius: 25px;
        padding: 0.75rem 2rem;
        font-weight: 600;
      }
      .btn-primary:hover {
        background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        transform: translateY(-2px);
        transition: all 0.3s ease;
      }
      .alert-sm {
        padding: 0.5rem 1rem;
        margin-top: 0.5rem;
      }
      .card {
        border: none;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }
      .preview-widget {
        background: white;
        border-radius: 10px;
        padding: 1.5rem;
        color: #333;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body class="bg-page-black">
    <!-- Header -->
    <div data-component="tools-header.html" data-icon="bi-rocket" data-title="Criar Widget" data-subtitle="Crie seu widget de venda em 3 passos"></div>

    <div class="container py-4">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <!-- Card Principal -->
          <div class="card border-primary">
            <div class="card-header bg-primary bg-opacity-10">
              <h4 class="mb-0">
                <i class="bi bi-magic me-2"></i>
                Criar Widget de Vendas
              </h4>
            </div>
            <div class="card-body">
              <!-- Container para alertas -->
              <div id="alertContainer" class="mb-3"></div>
              <div id="loadingContainer" class="mb-3"></div>
              <!-- Formulário Simplificado -->
              <form id="widgetForm">
                <!-- Passo 1: Nome do Projeto -->
                <div class="mb-4">
                  <label class="form-label fw-semibold">
                    <i class="bi bi-tag me-1"></i>
                    Nome do Projeto *
                  </label>
                  <input type="text" class="form-control" id="projectName" placeholder="Ex: Meu Token" required />
                  <small class="text-muted">Este nome será exibido no topo do widget</small>
                </div>

                <!-- Passo 2: Rede Blockchain -->
                <div class="mb-4">
                  <!-- Campo oculto para chainId (usado internamente pelo widget) -->
                  <input type="hidden" id="blockchain" />
                  <!-- Busca de Rede (componente compartilhado) -->
                  <div class="mt-2">
                    <div data-component="shared/components/network-search.html" data-ns-placeholder="Digite o nome da rede ou Chain ID (ex: Ethereum, Polygon, 1, 137)" data-ns-min-chars="1" data-ns-show-popular="true" data-ns-show-details-on-select="false"></div>
                  </div>
                </div>

                <!-- Passo 3: Contrato de Venda -->
                <div class="mb-4" id="contractGroup">
                  <label class="form-label fw-semibold">
                    <i class="bi bi-file-code me-1"></i>
                    Endereço do Contrato *
                  </label>
                  <div class="input-group">
                    <input type="text" class="form-control" id="saleContract" placeholder="0x... (Token ou Contrato de Venda)" required />
                    <button class="btn btn-outline-secondary" type="button" id="validateBtn">
                      <i class="bi bi-check-circle"></i>
                      Validar
                    </button>
                  </div>
                  <small class="text-muted">
                    <i class="bi bi-info-circle me-1"></i>
                    Digite o endereço de um token para criar um contrato de venda, ou um contrato de venda existente
                  </small>
                  <div id="validationStatus" class="mt-2"></div>
                </div>

                <!-- Opções Avançadas (Opcional) -->
                <div class="accordion mb-4" id="advancedAccordion">
                  <div class="accordion-item">
                    <h2 class="accordion-header">
                      <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#advancedOptions">
                        <i class="bi bi-gear me-2"></i>
                        Opções Avançadas (Opcional)
                      </button>
                    </h2>
                    <div id="advancedOptions" class="accordion-collapse collapse" data-bs-parent="#advancedAccordion">
                      <div class="accordion-body">
                        <!-- Preço por Token -->
                        <div class="mb-3">
                          <label class="form-label">Preço por Token</label>
                          <div class="input-group">
                            <input type="number" class="form-control" id="tokenPrice" placeholder="0.01" step="0.0001" />
                            <span class="input-group-text" id="currencySymbol">BNB</span>
                          </div>
                          <small class="text-muted">Deixe vazio para auto-detectar</small>
                        </div>

                        <!-- Limites de Compra -->
                        <div class="row">
                          <div class="col-md-6">
                            <label class="form-label">Mínimo por compra</label>
                            <input type="number" class="form-control" id="minPurchase" placeholder="10" />
                          </div>
                          <div class="col-md-6">
                            <label class="form-label">Máximo por compra</label>
                            <input type="number" class="form-control" id="maxPurchase" placeholder="10000" />
                          </div>
                        </div>

                        <!-- Textos Personalizados -->
                        <div class="mb-3 mt-3">
                          <label class="form-label">Texto do Botão</label>
                          <input type="text" class="form-control" id="buyButtonText" placeholder="Comprar Tokens" value="Comprar Tokens" />
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- Botão de Ação -->
                <div class="d-grid gap-2">
                  <button type="submit" class="btn btn-outline-primary btn-lg" id="generateBtn">
                    <i class="bi bi-rocket-takeoff me-2"></i>
                    Gerar Widget
                  </button>
                </div>
              </form>
            </div>
          </div>

          <!-- Card de Preview -->
          <div class="card mt-4" id="previewCard" style="display: none">
            <div class="card-header bg-success bg-opacity-10">
              <h5 class="mb-0">
                <i class="bi bi-eye me-2"></i>
                Preview do Widget
              </h5>
            </div>
            <div class="card-body">
              <div id="widgetPreview"></div>
              <div class="mt-3">
                <button class="btn btn-outline-success" id="copyCodeBtn">
                  <i class="bi bi-clipboard me-2"></i>
                  Copiar Código
                </button>
                <button class="btn btn-outline-secondary" id="downloadJsonBtn">
                  <i class="bi bi-download me-2"></i>
                  Baixar Config
                </button>
              </div>
            </div>
          </div>

          <!-- Card de Código Embed -->
          <div class="card mt-4" id="embedCard" style="display: none">
            <div class="card-header bg-info bg-opacity-10">
              <h5 class="mb-0">
                <i class="bi bi-code-slash me-2"></i>
                Código para Incorporar
              </h5>
            </div>
            <div class="card-body">
              <div class="alert alert-info">
                <i class="bi bi-info-circle me-2"></i>
                Copie este código e cole no seu site para exibir o widget
              </div>
              <div class="position-relative">
                <pre id="embedCode" class="bg-dark text-light p-3 rounded"></pre>
                <button class="btn btn-sm btn-outline-light position-absolute top-0 end-0 m-2" id="copyEmbedBtn" title="Copiar código">
                  <i class="bi bi-clipboard"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <div data-component="shared/layouts/scripts-base.html"></div>

    <!-- Scripts em módulo (ES6) -->
    <script type="module" src="../../../js/shared/base-system.js"></script>
    <script type="module" src="../../../js/shared/network-manager.js"></script>
    <script type="module" src="../../../js/shared/wallet-connector.js"></script>
    <script type="module" src="../../../js/shared/page-manager.js"></script>

    <!-- O widget-generator agora é importado pelo widget-simple -->
    <!-- <script type="module" src="../../../js/modules/widget/widget-generator.js"></script> -->

    <!-- Scripts globais (IIFE / sem módulos) -->
    <script src="../../../js/modules/widget/contract-deployer.js"></script>

    <!-- Widget-simple agora é um módulo -->
    <!-- <script src="../../../js/modules/widget/widget-simple.js"></script> -->

    <!-- Inicialização da página (módulo) -->
    <script type="module">
      import PageManager from "../../../js/shared/page-manager.js";
      import { walletConnector } from "../../../js/shared/wallet-connector.js";
      import { NetworkManager } from "../../../js/shared/network-manager.js";
      import { WidgetSimple } from "../../../js/modules/widget/widget-simple.js";

      document.addEventListener("DOMContentLoaded", async () => {
        try {
          // Evita múltiplas instâncias: reutiliza se já existir
          let widgetSimple = window.widgetSimple;
          if (!(widgetSimple instanceof WidgetSimple)) {
            widgetSimple = new WidgetSimple();
          }
          window.widgetSimple = widgetSimple; // Disponibiliza globalmente se necessário
          await widgetSimple.init();
        } catch (e) {
          console.error("Falha ao instanciar/iniciar WidgetSimple:", e);
        }

        const pm = new PageManager("link");
        try {
          await pm.init();
        } catch (e) {
          console.warn("Falha ao iniciar PageManager:", e?.message || e);
        }

        // Override inicial com dados fornecidos (para validação controlada)
        window.__overrideChainId = 97;
        window.__overrideSaleContract = "0x2701B4ef482BE4DD8A653B7C97090713A9a0AFE6";
        window.__overrideReceiverWallet = "0xEe02E32d8d2888E9f1D6d13391E716Bc7F41f6Ae";
        window.__overrideTokenContract = "0x2cf724171a998C3d470048AC2F1b187a48A5cafE";

        // Preencher UI com overrides
        try {
          const sel = document.getElementById("blockchain");
          if (sel) sel.value = String(window.__overrideChainId);
          const saleEl = document.getElementById("saleContract");
          if (saleEl) saleEl.value = window.__overrideSaleContract;
          const nm = new NetworkManager();
          const net = nm.getNetworkById(window.__overrideChainId);
          const symSpan = document.getElementById("currencySymbol");
          if (symSpan && net?.nativeCurrency?.symbol) symSpan.textContent = net.nativeCurrency.symbol;
          window.__selectedNetwork = net || null;
        } catch (_) {}

        // Integrar eventos do componente de busca de rede
        document.addEventListener("network:selected", (ev) => {
          const net = ev?.detail?.network;
          if (!net) return;
          const sel = document.getElementById("blockchain");
          if (sel) sel.value = String(net.chainId);
          const symSpan = document.getElementById("currencySymbol");
          if (symSpan && net?.nativeCurrency?.symbol) symSpan.textContent = net.nativeCurrency.symbol;
          window.__selectedNetwork = net;
        });
        document.addEventListener("network:clear", () => {
          const sel = document.getElementById("blockchain");
          if (sel) sel.value = "";
          window.__selectedNetwork = null;
        });

        // Já inicializado acima; não chamar init novamente para evitar duplicações
      });
    </script>
  </body>
</html>
