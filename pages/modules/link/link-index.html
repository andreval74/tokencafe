<!doctype html>
<html lang="pt-BR">

<head>
  <title>Gerador de Links - TokenCafe</title>
  <meta name="description" content="Crie links compartilháveis para tokens em redes blockchain" />
  <meta name="keywords" content="token, link, blockchain, MetaMask, compartilhar" />

  <!-- Head unificado com meta tags, favicons, Bootstrap, fontes -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="author" content="TokenCafe Team" />

  <!-- Security Headers -->
  <meta http-equiv="Content-Security-Policy"
    content="script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; connect-src 'self' https: ws: wss:; object-src 'none'; base-uri 'self';" />

  <!-- Favicons TokenCafe -->
  <link rel="icon" type="image/png" sizes="16x16" href="../../../imgs/tkncafe16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="../../../imgs/tkncafe32x32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="../../../imgs/tkncafe192x192.png" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/brands.min.css" rel="stylesheet" />

  <!-- TokenCafe CSS Unificado -->
  <link href="../../../css/styles.css" rel="stylesheet" />
</head>

<body class="bg-page-black">
  <!-- Header padrão com status de carteira (componente) -->
  <div data-component="tools-header.html" data-icon="fa-link" data-icon-alt="Link Generator"
    data-title="Gerador de Links" data-subtitle="Crie e compartilhe links de tokens"></div>

  <!-- ==========================================================================
         CONTEÚDO PRINCIPAL - USANDO SISTEMA UNIFICADO
         ========================================================================= -->
  <div class="container">
    <div class="g-4">
      <div class="col-12">
        <!-- ===== SEÇÃO 1: SELECIONAR REDE ===== -->
        <div class="mb-4" id="network-section">
          <div data-component="shared/components/network-search.html"></div>
        </div>

        <!-- ===== SEÇÃO 2: DADOS DO TOKEN ===== -->
        <div id="token-section" class="mb-4">
          <div data-component="shared/components/contract-search.html"></div>
        
        
        </div>
      </div>

      <!-- ===== SEÇÃO 3: LINK GERADO ===== -->
      <div id="generate-section" class="mb-4 d-none">
        <div id="generateSectionTitle" data-component="shared/components/section-title.html"
          data-st-icon="bi-link-45deg" data-st-title="Link Gerado"
          data-st-subtitle="Copie, compartilhe ou teste o link">
        </div>

        <div id="generatedLinkGroup" class="input-group mt-2">
          <input id="generatedLink" class="form-control" readonly aria-label="Link gerado" />
        </div>
        <small id="metaValidatedBadge" class="text-success d-none mt-1">
          <i class="bi bi-check-circle me-1"></i>
          Dados do contrato confirmados (símbolo/decimais)
        </small>
        <div class="row row-cols-6 g-2 mt-2" id="generatedActionsRow">
          <div class="col">
            <button id="btnCopyLink" class="btn btn-outline-secondary btn-lg w-100" title="Copiar"
              aria-label="Copiar">
              <i class="bi bi-clipboard me-1"></i>Copiar
            </button>
          </div>
          <div class="col">
            <button id="btnShareWhatsAppSmall" class="btn btn-outline-success btn-lg w-100" title="WhatsApp"
              aria-label="WhatsApp">
              <i class="fab fa-whatsapp me-1"></i>WhatsApp
            </button>
          </div>
          <div class="col">
            <button id="btnShareTelegramSmall" class="btn btn-outline-info btn-lg w-100" title="Telegram"
              aria-label="Telegram">
              <i class="fab fa-telegram me-1"></i>Telegram
            </button>
          </div>
          <div class="col">
            <button id="btnShareEmailSmall" class="btn btn-outline-warning btn-lg w-100" title="Email"
              aria-label="Email">
              <i class="bi bi-envelope me-1"></i>Email
            </button>
          </div>
          <div class="col">
            <button id="btnOpenLink" class="btn btn-outline-primary btn-lg w-100" title="Testar"
              aria-label="Testar">
              <i class="bi bi-box-arrow-up-right me-1"></i>Testar
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>
  </div>

  <!-- ==========================================================================
         SCRIPTS UNIFICADOS - TOKENCAFE
         ========================================================================= -->

  <!-- Base System para carregamento de componentes -->
  <script type="module" src="../../../js/shared/base-system.js"></script>
  <div data-component="shared/layouts/scripts-base.html"></div>

  <div class="container-fluid">
    <div data-component="shared/components/section-footer.html" data-sf-icon="bi-award"
      data-sf-title="Feito por webkeeper.com.br" data-sf-subtitle="Link Generator padronizado"></div>
  </div>
  <!-- TokenCafe Link Logic (módulo dedicado) -->
  <script type="module" src="../../../js/modules/link/link-index.js"></script>
</body>

</html>
