<!doctype html>
<html lang="pt-BR">

<head>
  <title>Adicionar Token - TokenCafe</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Adicionar token à carteira a partir de um link" />
  <meta name="author" content="TokenCafe Team" />
  <meta http-equiv="Content-Security-Policy"
    content="script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; object-src 'none'; base-uri 'self';" />
  <link rel="icon" type="image/png" sizes="16x16" href="../../../imgs/tkncafe16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="../../../imgs/tkncafe32x32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="../../../imgs/tkncafe192x192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link href="../../../css/styles.css" rel="stylesheet" />
</head>

<body class="bg-page-black">
  <div data-component="tools-header.html" data-icon="fa-wallet" data-icon-alt="Wallet" data-title="Adicionar Token"
    data-subtitle="Verifique os dados e adicione à carteira"></div>

  <div class="container">
    <div class="g-4">
      <div class="col-12">
        <div class="mb-3">
          <div data-component="shared/components/section-title.html" data-st-icon="bi-wallet2"
            data-st-title="Adicionar Token" data-st-subtitle="Verifique os dados e adicione à carteira"></div>
        </div>

        <div class="p-3 bg-dark-elevated" id="tokenView">
          <div class="row g-2 small">
            <div class="col-12">Endereço: <span id="viewAddress" class="text-tokencafe"></span></div>
            <div class="col-6">Rede: <span id="viewChainName" class="text-tokencafe"></span></div>
            <div class="col-6">Chain ID: <span id="viewChainId" class="text-tokencafe"></span></div>
            <div class="col-6">Nome: <span id="viewName" class="text-tokencafe"></span></div>
            <div class="col-6">Símbolo: <span id="viewSymbol" class="text-tokencafe"></span></div>
            <div class="col-6">Decimais: <span id="viewDecimals" class="text-tokencafe"></span></div>
            <div class="col-6">Explorer: <a id="viewExplorer" href="#" target="_blank" rel="noopener"
                class="text-decoration-none text-tokencafe">abrir</a></div>
          </div>
        </div>

        <div class="d-grid gap-3 mt-3">
          <button id="addToWalletButton" class="btn btn-outline-primary btn-lg w-100">
            <i class="fas fa-wallet me-2"></i>
            Adicionar à Carteira
          </button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="../../../js/shared/base-system.js"></script>
  <div data-component="shared/layouts/scripts-base.html"></div>

  <div class="container-fluid">
    <div data-component="shared/components/section-footer.html" data-sf-icon="bi-award"
      data-sf-title="Feito por webkeeper.com.br" data-sf-subtitle="Adicionar Token padronizado"></div>
  </div>

  <script type="module" src="../../../js/modules/link/link-token.js"></script>
</body>

</html>
