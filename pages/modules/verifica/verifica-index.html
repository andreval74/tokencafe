<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Verificação de Contrato</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="../../../css/styles.css" rel="stylesheet" />
</head>

<body class="bg-page-black">
  <div data-component="tools-header.html" data-icon="fa-shield" data-icon-alt="Verificação"
    data-title="Verificação de Contrato" data-subtitle="Publicar código e validar"></div>

  <div class="container">
    <div class="g-4">
      <div class="col-12">
        <!-- Seleção da Rede -->
        <div class="mb-4" id="network-section">
          <div data-component="shared/components/network-search.html"></div>
        </div>

        <!-- Dados do contrato -->
        <div class="mt-3">
          <div class="row g-2">
            <div class="col-12">
              <div data-component="shared/components/contract-search.html"></div>
            </div>
            <!-- f_address removed to avoid duplicate ID with contract-search component -->
            <input id="f_chainId" type="hidden" />
            <div class="col-md-3 d-none">
              <label for="f_contractName" class="form-label small">
                Nome do contrato
                <span class="text-danger">*</span>
                <i class="bi bi-info-circle" data-bs-toggle="tooltip" title="Nome do contrato na compilação"></i>
              </label>
              <input id="f_contractName" class="form-control form-control-sm" placeholder="ex: MyToken" />
            </div>
            <div class="col-md-3 d-none">
              <label for="f_compilerVersion" class="form-label small">
                Versão do compilador
                <span class="text-danger">*</span>
                <i class="bi bi-info-circle" data-bs-toggle="tooltip" title="Versão do solc usada na compilação"></i>
                <span id="compVerLockIcon" class="ms-1 text-warning d-none"><i class="bi bi-lock-fill"></i></span>
              </label>
              <input id="f_compilerVersion" class="form-control form-control-sm" placeholder="ex: v0.8.30+commit.73712a01" list="compilerVersions" />
              <datalist id="compilerVersions">
                <option value="v0.8.30+commit.73712a01">
                <option value="v0.8.29+commit.ab55807c">
                <option value="v0.8.28+commit.78136a7d">
                <option value="v0.8.27+commit.40a35a09">
                <option value="v0.8.26+commit.8a97fa7a">
                <option value="v0.8.25+commit.b61c2a91">
                <option value="v0.8.24+commit.e11b9ed9">
                <option value="v0.8.23+commit.f704f362">
                <option value="v0.8.22+commit.4fc1097e">
                <option value="v0.8.21+commit.d9974bed">
                <option value="v0.8.20+commit.a1b79de6">
              </datalist>
              <div id="compVerHelp" class="form-text d-none">Versão obtida do metadata.json</div>
            </div>
          </div>
          
          
        </div>
        <div class="mt-3">
          <div id="explorerStatusText" class="form-text text-muted d-none"></div>
        </div>
        <div id="codeSourceSection" class="d-none">
          <div class="mt-3">
            <div class="card bg-dark border-secondary">
              <div class="card-header border-secondary d-flex justify-content-between align-items-center">
                <h6 class="mb-0 text-white"><i class="bi bi-file-earmark-code me-2"></i>Código Fonte</h6>
                <div class="btn-row" style="width: auto;">
                  <button id="importSourceBtn" class="btn btn-outline-primary">Importar</button>
                  <button id="copySourceBtn" class="btn btn-outline-light">Copiar</button>
                  <button id="pasteSourceBtn" class="btn btn-outline-light">Colar</button>
                  <button id="clearSourceBtn" class="btn btn-outline-danger">Limpar</button>
                </div>
              </div>
              <div class="card-body">
                <pre id="cardSourcePreview" class="text-white small code-display">-</pre>
                <input id="importSourceFile" type="file" class="d-none" accept=".sol,.vy,.txt" />
              </div>
            </div>
          </div>
          <div class="d-none">
            <textarea id="f_sourceCode" class="form-control form-control-sm" rows="4" placeholder="// ..."></textarea>
          </div>
          <div class="d-none">
            <label class="form-label small">Import Sources</label>
            <div class="d-flex gap-2 align-items-center">
              <input id="f_sourceFiles" type="file" class="form-control form-control-sm" multiple
                accept=".sol,.vy,.json,.abi,.txt" />
              <button id="runImportSources" class="btn btn-sm btn-outline-info">Importar</button>
            </div>
            <div class="form-text">Licenças devem estar marcadas com comentários SPDX no topo dos arquivos.</div>
          </div>
          <div class="mt-2 d-none">
            <div class="card bg-dark border-secondary">
              <div class="card-header border-secondary d-flex justify-content-between align-items-center">
                <h6 class="mb-0 text-white"><i class="bi bi-braces me-2"></i>Metadata.json</h6>
                <div class="d-flex gap-2">
                  <button id="importMetadataBtn" class="btn btn-sm btn-outline-primary">Importar</button>
                  <button id="copyMetadataBtn" class="btn btn-sm btn-outline-light">Copiar</button>
                </div>
              </div>
              <div class="card-body">
                <pre id="cardMetadataPreview" class="text-white small code-display">-</pre>
                <input id="importMetadataFile" type="file" class="d-none" accept=".json" />
                <div class="form-text">Importe o arquivo .sol e opcionalmente o metadata.json</div>
              </div>
            </div>
          </div>
          <div class="d-none">
            <textarea id="f_metadata" class="form-control form-control-sm" rows="4" placeholder="{ ... }"></textarea>
          </div>
        </div>

        <div id="actionButtons" class="mt-3 d-none">
          <div class="btn-row">
            <button id="runVerify" class="btn btn-outline-success">
              <span id="verifySpinner" class="spinner-border spinner-border-sm me-1 d-none" role="status"
                aria-hidden="true"></span>
              <i class="bi bi-shield-check me-1"></i>
              <span id="verifyBtnText">Verificar</span>
            </button>
          </div>
        </div>
        
        <div class="d-flex justify-content-end mt-4">
            <button id="btnClearForm" class="btn btn-outline-secondary">
              <i class="bi bi-eraser me-1"></i>
              Limpar Dados
            </button>
        </div>

        <div id="apiKeyField" class="d-none">
          <input id="f_apiKey" type="password" value="I33WZ4CVTPWDG3VEJWN36TQ9USU9QUBVX5" />
        </div>
        <div id="verifyStatus" class="small text-muted mt-2"></div>
      
      <!-- Modal: Verificação removido (agora via Modal global) -->

      </div>
    </div>
  </div>
  <div class="container-fluid">
    <div data-component="shared/components/section-footer.html"></div>
  </div>

  <script type="module" src="../../../js/shared/base-system.js"></script>
  <div data-component="shared/layouts/scripts-base.html"></div>
  <script src="../../../js/modules/verifica/api-config.js"></script>
  <!-- Módulo unificado de busca e preenchimento de dados do contrato -->
  <script type="module" src="../../../js/shared/contract-search.js"></script>
  <script type="module" src="../../../js/modules/verifica/verifica-index.js"></script>
</body>

</html>
