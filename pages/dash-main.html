<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TokenCafe Dashboard - Painel de Controle Web3</title>
    <meta name="description" content="Dashboard TokenCafe - Gerencie seus tokens, analise métricas e acesse todas as funcionalidades da plataforma Web3.">

    <link rel="icon" type="image/png" sizes="32x32" href="../imgs/tkncafe32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../imgs/tkncafe16x16.png">

    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- TokenCafe Styles -->
    <link href="../css/styles.css" rel="stylesheet">
</head>

<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <img src="../imgs/tkncafe192x192.png" alt="TokenCafe" style="width: 80px; height: 80px; margin-bottom: 20px;">
            <div class="loading-spinner"></div>
            <p class="text-muted mt-3">Verificando conexão da carteira...</p>
        </div>
    </div>

    <!-- Dashboard Container -->
    <div class="dashboard-container" id="dashboard-container" style="display: none;">
        <!-- Sidebar Component -->
        <div id="sidebar-container"></div>
        
        <!-- Main Content Component -->
        <div id="main-content-container"></div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/template-loader.js"></script>
    <script src="../js/navigation-utils.js"></script>
    <script src="../js/web3-connection.js"></script>

    <script>
        /**
         * ================================================================================
         * DASHBOARD CONTROLLER - CONTROLADOR PRINCIPAL DO DASHBOARD
         * ================================================================================
         * Verifica conexão da carteira e carrega componentes
         * ================================================================================
         */
        class DashboardController {
            constructor() {
                this.isConnected = false;
                this.walletAddress = null;
                this.networkId = null;
                this.init();
            }

            async init() {
                console.log('🎯 Inicializando Dashboard Controller...');
                
                // Verificar conexão da carteira
                await this.checkWalletConnection();
                
                if (this.isConnected) {
                    // Carregar componentes do dashboard
                    await this.loadDashboardComponents();
                    
                    // Esconder loading e mostrar dashboard
                    this.showDashboard();
                } else {
                    // Redirecionar para página de login
                    this.redirectToLogin();
                }
                
                console.log('✅ Dashboard Controller inicializado');
            }

            async checkWalletConnection() {
                try {
                    // Verificar se há dados salvos no localStorage
                    const savedAddress = localStorage.getItem('tokencafe_wallet_address');
                    const savedConnected = localStorage.getItem('tokencafe_connected');
                    const savedNetwork = localStorage.getItem('tokencafe_network_id');

                    if (savedAddress && savedConnected === 'true') {
                        // Verificar se MetaMask ainda está conectado
                        if (typeof window.ethereum !== 'undefined') {
                            try {
                                const accounts = await window.ethereum.request({
                                    method: 'eth_accounts'
                                });

                                if (accounts.length > 0 && accounts[0].toLowerCase() === savedAddress.toLowerCase()) {
                                    this.isConnected = true;
                                    this.walletAddress = savedAddress;
                                    this.networkId = savedNetwork;
                                    
                                    console.log('✅ Carteira conectada:', this.walletAddress);
                                    return;
                                }
                            } catch (error) {
                                console.log('⚠️ Erro ao verificar contas:', error.message);
                            }
                        }
                    }

                    // Se chegou até aqui, não está conectado
                    this.clearWalletData();
                    
                } catch (error) {
                    console.error('❌ Erro ao verificar conexão da carteira:', error);
                    this.clearWalletData();
                }
            }

            clearWalletData() {
                localStorage.removeItem('tokencafe_wallet_address');
                localStorage.removeItem('tokencafe_connected');
                localStorage.removeItem('tokencafe_network_id');
                this.isConnected = false;
                this.walletAddress = null;
                this.networkId = null;
            }

            async loadDashboardComponents() {
                console.log('📦 Carregando componentes do dashboard...');

                try {
                    // Carregar sidebar
                    const sidebarHtml = await this.loadComponent('../shared/templates/dashboard-sidebar.html');
                    document.getElementById('sidebar-container').innerHTML = sidebarHtml;

                    // Carregar main content
                    const mainContentHtml = await this.loadComponent('../shared/templates/dashboard-main-content.html');
                    document.getElementById('main-content-container').innerHTML = mainContentHtml;

                    // Disparar evento de carteira conectada para os componentes
                    window.dispatchEvent(new CustomEvent('walletConnected', {
                        detail: {
                            address: this.walletAddress,
                            networkId: this.networkId
                        }
                    }));

                } catch (error) {
                    console.error('❌ Erro ao carregar componentes:', error);
                    this.showError('Erro ao carregar dashboard. Recarregue a página.');
                }
            }

            async loadComponent(url) {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`Erro ao carregar ${url}: ${response.status}`);
                }
                return await response.text();
            }

            showDashboard() {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('dashboard-container').style.display = 'flex';
            }

            redirectToLogin() {
                console.log('🔄 Redirecionando para página de login...');
                setTimeout(() => {
                    TokenCafeNavigation.goToHome();
                }, 2000);

                // Mostrar mensagem de erro na tela de loading
                const loadingContent = document.querySelector('.loading-content p');
                loadingContent.innerHTML = `
                    <i class="fas fa-exclamation-triangle text-warning"></i><br>
                    Carteira não conectada!<br>
                    <small class="text-muted">Redirecionando para página inicial...</small>
                `;
            }

            showError(message) {
                const loadingContent = document.querySelector('.loading-content');
                loadingContent.innerHTML = `
                    <i class="fas fa-exclamation-circle fa-3x text-danger mb-3"></i>
                    <p class="text-danger">${message}</p>
                    <button class="btn btn-primary btn-sm" onclick="location.reload()">
                        <i class="fas fa-redo me-1"></i>Tentar Novamente
                    </button>
                `;
            }
        }

        // Função global para desconectar carteira
        function disconnectWallet() {
            console.log('🚪 Desconectando carteira...');
            
            // Limpar dados do localStorage
            localStorage.removeItem('tokencafe_wallet_address');
            localStorage.removeItem('tokencafe_connected');
            localStorage.removeItem('tokencafe_network_id');
            
            // Disparar evento de desconexão
            window.dispatchEvent(new CustomEvent('walletDisconnected'));
            
            // Redirecionar para home
            TokenCafeNavigation.goToHome();
        }

        // Inicializar Dashboard quando DOM estiver pronto
        document.addEventListener('DOMContentLoaded', () => {
            window.dashboardController = new DashboardController();
        });
    </script>

    <!-- Loading Screen CSS -->
    <style>
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loading-content {
            text-align: center;
            color: white;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(245, 158, 11, 0.3);
            border-radius: 50%;
            border-top-color: #f59e0b;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .dashboard-container {
            height: 100vh;
            display: flex;
        }

        #sidebar-container {
            flex-shrink: 0;
        }

        #main-content-container {
            flex: 1;
            overflow-y: auto;
        }
    </style>
</body>

</html>
