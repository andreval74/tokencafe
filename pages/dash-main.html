<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TokenCafe Dashboard - Painel de Controle Web3</title>
    <meta name="description" content="Dashboard TokenCafe - Gerencie seus tokens, analise métricas e acesse todas as funcionalidades da plataforma Web3.">

    <link rel="icon" type="image/png" sizes="32x32" href="../imgs/tkncafe32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../imgs/tkncafe16x16.png">

    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- TokenCafe Styles -->
    <link href="../css/styles.css" rel="stylesheet">
</head>

<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <img src="../imgs/tkncafe192x192.png" alt="TokenCafe" style="width: 80px; height: 80px; margin-bottom: 20px;">
            <div class="loading-spinner"></div>
            <p class="text-muted mt-3">Verificando conexão da carteira...</p>
        </div>
    </div>

    <!-- Dashboard Container -->
    <div class="dashboard-container" id="dashboard-container" style="display: none;">
        <!-- Sidebar Component -->
        <div id="sidebar-container"></div>
        
        <!-- Main Content Component -->
        <div id="main-content-container"></div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/template-loader.js"></script>
    <script src="../js/navigation-utils.js"></script>
    <script src="../js/web3-connection.js"></script>
    <script src="../js/confirm-modal.js"></script>
    <script src="../js/dashboard-header.js"></script>
    <script src="../js/dashboard-footer.js"></script>
    <script src="../js/main-content-manager.js"></script>
    <script src="../js/sidebar-manager.js"></script>
    <script src="../js/dashboard-controller.js"></script>

    <!-- Loading Screen CSS -->
    <style>
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loading-content {
            text-align: center;
            color: white;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(245, 158, 11, 0.3);
            border-radius: 50%;
            border-top-color: #f59e0b;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .dashboard-container {
            height: 100vh;
            display: flex;
        }

        #sidebar-container {
            flex-shrink: 0;
        }

        #main-content-container {
            flex: 1;
            overflow-y: auto;
        }
    </style>
</body>

</html>
